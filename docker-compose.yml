name: gotech-data-engineering

services:
  postgres:
    image: postgres:16-alpine
    container_name: gotech-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: gotech-airflow
    restart: unless-stopped
    command: standalone
    working_dir: /opt/airflow/project

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: "America/La_Paz"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__API__INSTANCE_NAME: "GoTech Data Engineering Pipeline"

      PYTHONPATH: /opt/airflow/project

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

      TZ: "America/La_Paz"

    ports:
      - "${AIRFLOW_PORT:-8080}:8080"

    volumes:
      - airflow_home:/opt/airflow
      - ./dags:/opt/airflow/dags:ro
      - ./src:/opt/airflow/project/src:ro
      - ./data:/opt/airflow/project/data
      - ./docs:/opt/airflow/project/docs:ro

  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile

    container_name: gotech-jupyter
    restart: unless-stopped
    working_dir: /home/jovyan/work

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PYTHONPATH: /home/jovyan/work

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

      TZ: "America/La_Paz"

    command:
      - start-notebook.py
      - --ServerApp.ip=0.0.0.0
      - --ServerApp.port=8888
      - --ServerApp.root_dir=/home/jovyan/work
      - --ServerApp.token=${JUPYTER_TOKEN}
      - --ServerApp.password=

    ports:
      - "${JUPYTER_PORT:-8888}:8888"

    volumes:
      - jupyter_home:/home/jovyan
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./src:/home/jovyan/work/src:ro
      - ./docs:/home/jovyan/work/docs

volumes:
  postgres_data:
  airflow_home:
  jupyter_home: